name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release Type"
        required: true
        type: choice
        default: "patch"
        options:
        - major
        - minor
        - patch

permissions:
  contents: write  # bump-my-version pushes the version bump commit + tag; release-action creates the GitHub Release

env:
  PYTHON_LATEST: 3.12

jobs:
  build:
    name: Publish
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v7

    - name: Install Python ${{ env.PYTHON_LATEST }}
      run: uv python install ${{ env.PYTHON_LATEST }}

    - name: Bump version
      id: bump
      # Pinned to the commit behind callowayproject/bump-my-version v1.3.0
      uses: callowayproject/bump-my-version@e6ecdc3e573698766cd6c2112faeda50bcc2e56a
      env:
        BUMPVERSION_TAG: "false"
      with:
        args: ${{ inputs.release_type }}
        github-token: ${{ secrets.GH_TOKEN }}
    
    - name: Build
      run: uv build

    - name: Publish
      run: uv publish --token ${{ secrets.PYPI_API_TOKEN }}

    - name: GitHub Release PIP v${{ steps.bump.outputs.current-version }}
      uses: ncipollo/release-action@v1
      with:
        name: gh-space-shooter pypi v${{ steps.bump.outputs.current-version }}
        tag: v${{ steps.bump.outputs.current-version }}
        body: "Automated release of pypi version v${{ steps.bump.outputs.current-version }}"
        artifacts: dist/*
        token: ${{ secrets.GH_TOKEN }}
        generateReleaseNotes: true